<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .brand { font-family: 'DM Serif Display', serif; }

    #page-loader {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(2px);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #page-loader.active {
      display: flex;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e5e7eb;
      border-top-color: #111827;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn-spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .btn-spinner.active {
      display: inline-block;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>

<body class="min-h-screen bg-gray-100 flex items-center justify-center px-4 py-10">

  <div id="page-loader">
    <div class="flex flex-col items-center gap-3">
      <div class="spinner"></div>
      <p class="text-xs text-gray-400 tracking-wide">Please wait…</p>
    </div>
  </div>

  {% block content %}{% endblock %}

  <script>
    document.addEventListener('submit', function (e) {
      const form = e.target;
      if (form.tagName !== 'FORM') return;

      const btn = form.querySelector('button[type="submit"]');
      if (!btn) return;

      btn.disabled = true;

      const btnText = btn.querySelector('.btn-text');
      const btnSpinner = btn.querySelector('.btn-spinner');

      if (btnText) btnText.textContent = 'Please wait…';
      if (btnSpinner) btnSpinner.classList.add('active');

      document.getElementById('page-loader').classList.add('active');
    });
  </script>

  {% block extra_scripts %}{% endblock %}

</body>
</html>
